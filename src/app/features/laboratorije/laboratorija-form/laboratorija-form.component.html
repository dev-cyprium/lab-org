<section class="detalj">
  <a mat-button routerLink="/laboratorije">
    <mat-icon>arrow_back</mat-icon>
    Nazad
  </a>

  <div class="spinner" *ngIf="ucitavanje"><mat-spinner diameter="40"></mat-spinner></div>

  <mat-card class="kartica-detalj" *ngIf="!ucitavanje">
    <mat-card-header>
      <mat-card-title>{{ uredjivanje ? 'Izmena laboratorije' : 'Nova laboratorija' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="forma" (ngSubmit)="sacuvaj()" class="forma">
        <mat-form-field appearance="outline">
          <mat-label>Naziv</mat-label>
          <input matInput appAutoFocus formControlName="naziv" />
          <mat-error *ngIf="forma.get('naziv')?.hasError('required')">Obavezno polje.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tip</mat-label>
          <mat-select formControlName="tip">
            <mat-option *ngFor="let t of tipovi" [value]="t">{{ t }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Lokacija</mat-label>
          <input matInput formControlName="lokacija" />
          <mat-error *ngIf="forma.get('lokacija')?.hasError('required')">Obavezno polje.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Kontakt</mat-label>
          <input matInput formControlName="kontakt" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Šef laboratorije</mat-label>
          <mat-select formControlName="sefId">
            <mat-option value="">— nije određen —</mat-option>
            <mat-option *ngFor="let z of zaposleni" [value]="z.id">{{ z.ime }} {{ z.prezime }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Opis</mat-label>
          <textarea matInput rows="2" formControlName="opis"></textarea>
        </mat-form-field>

        <div class="akcije">
          <button mat-raised-button color="primary" type="submit" [disabled]="slanje">
            <mat-icon>save</mat-icon>
            Sačuvaj
          </button>
          <a mat-button routerLink="/laboratorije">Odustani</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
