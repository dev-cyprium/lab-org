<div class="auth-omot">
  <mat-card class="auth-kartica">
    <div class="brend">
      <mat-icon>biotech</mat-icon>
      <span>LabOrg</span>
    </div>
    <h1>Prijava</h1>

    <form [formGroup]="forma" (ngSubmit)="prijavi()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="username" />
        <mat-icon matSuffix>mail</mat-icon>
        <mat-error *ngIf="forma.get('email')?.hasError('required')">Email je obavezan.</mat-error>
        <mat-error *ngIf="forma.get('email')?.hasError('email')">Neispravan email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Lozinka</mat-label>
        <input matInput type="password" formControlName="lozinka" autocomplete="current-password" />
        <mat-icon matSuffix>lock</mat-icon>
        <mat-error *ngIf="forma.get('lozinka')?.hasError('required')">Lozinka je obavezna.</mat-error>
        <mat-error *ngIf="forma.get('lozinka')?.hasError('minlength')">Najmanje 6 karaktera.</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="slanje">
        <mat-icon>login</mat-icon>
        Prijavi se
      </button>
    </form>

    <p class="prebaci">
      Nemaš nalog? <a routerLink="/registracija">Registruj se</a>
    </p>
  </mat-card>
</div>
