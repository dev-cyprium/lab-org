<section class="detalj">
  <a mat-button routerLink="/podloge">
    <mat-icon>arrow_back</mat-icon>
    Nazad
  </a>

  <div class="spinner" *ngIf="ucitavanje"><mat-spinner diameter="40"></mat-spinner></div>

  <mat-card class="kartica-detalj" *ngIf="!ucitavanje">
    <mat-card-header>
      <mat-card-title>{{ uredjivanje ? 'Izmena podloge' : 'Nova podloga / reagens' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="forma" (ngSubmit)="sacuvaj()" class="forma">
        <mat-form-field appearance="outline">
          <mat-label>Naziv</mat-label>
          <input matInput appAutoFocus formControlName="naziv" />
          <mat-error *ngIf="forma.get('naziv')?.hasError('required')">Obavezno polje.</mat-error>
        </mat-form-field>

        <div class="red-polja">
          <mat-form-field appearance="outline">
            <mat-label>Tip</mat-label>
            <mat-select formControlName="tip">
              <mat-option *ngFor="let t of tipovi" [value]="t">{{ t }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Klasa opasnosti</mat-label>
            <mat-select formControlName="klasaOpasnosti">
              <mat-option *ngFor="let k of klase" [value]="k">{{ k }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Namena</mat-label>
          <input matInput formControlName="namena" />
          <mat-error *ngIf="forma.get('namena')?.hasError('required')">Obavezno polje.</mat-error>
        </mat-form-field>

        <div class="red-polja">
          <mat-form-field appearance="outline">
            <mat-label>Koncentracija</mat-label>
            <input matInput formControlName="koncentracija" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Količina</mat-label>
            <input matInput type="number" formControlName="kolicina" />
            <mat-error *ngIf="forma.get('kolicina')?.hasError('min')">Ne može biti negativna.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Jedinica</mat-label>
            <input matInput formControlName="jedinica" />
          </mat-form-field>
        </div>

        <div class="red-polja">
          <div class="datum-polje">
            <mat-form-field appearance="outline">
              <mat-label>Datum isteka</mat-label>
              <input matInput type="date" formControlName="datumIsteka" />
              <mat-error *ngIf="forma.get('datumIsteka')?.hasError('required')">Obavezno polje.</mat-error>
            </mat-form-field>
            <button mat-button type="button" class="datum-danas" (click)="postaviDanas()">Danas</button>
          </div>

          <mat-form-field appearance="outline">
            <mat-label>Proizvođač</mat-label>
            <input matInput formControlName="proizvodjac" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Lokacija</mat-label>
            <input matInput formControlName="lokacija" />
          </mat-form-field>
        </div>

        <div class="akcije">
          <button mat-raised-button color="primary" type="submit" [disabled]="slanje">
            <mat-icon>save</mat-icon>
            Sačuvaj
          </button>
          <a mat-button routerLink="/podloge">Odustani</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
