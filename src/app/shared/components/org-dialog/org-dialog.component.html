<h2 mat-dialog-title>Firme</h2>
<mat-dialog-content>
  <form [formGroup]="forma" class="forma">
    <mat-radio-group formControlName="nacin" class="nacin">
      <mat-radio-button value="nova">Napravi novu firmu</mat-radio-button>
      <mat-radio-button value="postojeca">Pridruži se postojećoj</mat-radio-button>
    </mat-radio-group>

    <ng-container *ngIf="nova">
      <mat-form-field appearance="outline">
        <mat-label>Naziv firme</mat-label>
        <input matInput appAutoFocus formControlName="naziv" />
        <mat-error *ngIf="forma.get('naziv')?.hasError('required')">Obavezno polje.</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>PIB</mat-label>
        <input matInput formControlName="pib" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Adresa</mat-label>
        <input matInput formControlName="adresa" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Kontakt</mat-label>
        <input matInput formControlName="kontakt" />
      </mat-form-field>
    </ng-container>

    <mat-form-field appearance="outline" *ngIf="!nova">
      <mat-label>Izaberi firmu</mat-label>
      <mat-select formControlName="kompanijaId">
        <mat-option *ngFor="let k of dostupne" [value]="k.id">{{ k.naziv }}</mat-option>
      </mat-select>
      <mat-error *ngIf="forma.get('kompanijaId')?.hasError('required')">Izaberi firmu.</mat-error>
    </mat-form-field>

    <p class="prazno" *ngIf="!nova && dostupne.length === 0">
      Već si član svih postojećih firmi.
    </p>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Odustani</button>
  <button mat-raised-button color="primary" [disabled]="slanje" (click)="sacuvaj()">
    {{ nova ? 'Napravi' : 'Pridruži se' }}
  </button>
</mat-dialog-actions>
