<h2 mat-dialog-title>{{ podaci.naslov }}</h2>
<mat-dialog-content>
  <p>{{ podaci.poruka }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Odustani</button>
  <button mat-raised-button color="warn" (click)="potvrdi()">
    {{ podaci.potvrdaTekst || 'Obriši' }}
  </button>
</mat-dialog-actions>
