<mat-toolbar color="primary" class="navbar">
  <button
    mat-icon-button
    *ngIf="korisnik$ | async"
    (click)="toggleSidenav.emit()"
    aria-label="Meni"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/pocetna" class="brend">
    <mat-icon>biotech</mat-icon>
    <span>LabOrg</span>
  </a>

  <span class="razmak"></span>

  <ng-container *ngIf="korisnik$ | async as korisnik; else nijePrijavljen">
    <!-- Zahtevi za pristup (vidljivo administratoru kad ima zahteva na čekanju). -->
    <a
      mat-icon-button
      routerLink="/zahtevi"
      *ngIf="(brojZahteva$ | async) as broj"
      [matBadge]="broj"
      matBadgeColor="warn"
      matBadgeSize="small"
      aria-label="Zahtevi za pristup"
      matTooltip="Zahtevi za pristup"
    >
      <mat-icon>group_add</mat-icon>
    </a>

    <!-- Prebacivanje između firmi (tenant switcher). -->
    <button mat-button class="org-dugme" [matMenuTriggerFor]="orgMeni">
      <mat-icon>apartment</mat-icon>
      <span class="org-naziv">{{ (aktivnaKompanija$ | async)?.naziv || 'Firma' }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #orgMeni="matMenu">
      <button
        mat-menu-item
        *ngFor="let k of mojeKompanije$ | async"
        (click)="promeni(k.id)"
      >
        <mat-icon>{{ k.id === (aktivnaKompanija$ | async)?.id ? 'check' : 'business' }}</mat-icon>
        <span>{{ k.naziv }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="otvoriDijalog()">
        <mat-icon>add_business</mat-icon>
        <span>Nova / pridruži se firmi</span>
      </button>
    </mat-menu>

    <button mat-button [matMenuTriggerFor]="korisnikMeni">
      <mat-icon>account_circle</mat-icon>
      <span class="korisnik-ime">{{ korisnik.ime }}</span>
    </button>
    <mat-menu #korisnikMeni="matMenu">
      <div class="meni-zaglavlje">
        <strong>{{ korisnik.ime }}</strong>
        <small>{{ korisnik.email }}</small>
      </div>
      <button mat-menu-item (click)="odjava()">
        <mat-icon>logout</mat-icon>
        <span>Odjavi se</span>
      </button>
    </mat-menu>
  </ng-container>

  <ng-template #nijePrijavljen>
    <a mat-button routerLink="/prijava">
      <mat-icon>login</mat-icon>
      <span class="korisnik-ime">Prijava</span>
    </a>
  </ng-template>
</mat-toolbar>
