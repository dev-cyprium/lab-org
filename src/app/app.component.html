<app-navbar (toggleSidenav)="drawer.toggle()"></app-navbar>

<mat-sidenav-container class="ljuska">
  <mat-sidenav
    #drawer
    mode="side"
    [opened]="(prijavljen$ | async) ?? false"
    [disableClose]="true"
    class="bocna-strana"
  >
    <app-sidebar></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content class="sadrzaj">
    <main class="glavni">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>
