<app-navbar (toggleSidenav)="drawer.toggle()"></app-navbar>

<mat-sidenav-container class="ljuska">
  <mat-sidenav
    #drawer
    [mode]="(maliEkran$ | async) ? 'over' : 'side'"
    [(opened)]="meniOtvoren"
    [disableClose]="!((maliEkran$ | async) ?? false)"
    class="bocna-strana"
  >
    <app-sidebar (navigated)="zatvoriMeni(drawer)"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content class="sadrzaj">
    <main class="glavni">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>
